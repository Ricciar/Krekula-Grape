<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bröllopsfest | Krekula-Grape</title>
    <meta
      name="description"
      content="Välkommen till bröllopsfest för Fredrik och Louise den 1 augusti 2026."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="color-wash wash-1" aria-hidden="true"></div>
    <div class="color-wash wash-2" aria-hidden="true"></div>
    <div class="color-wash wash-3" aria-hidden="true"></div>

    <img
      class="flower-background"
      src="./flowers4.jpg"
      alt=""
      aria-hidden="true"
      loading="eager"
      decoding="async"
    />

    <main class="page">
      <section class="invite-card">
        <div class="content">
          <h1 class="hero-script">FREDRIK &amp; LOUISE</h1>
          <p class="hero-date">1 AUG 2026</p>

          <section class="welcome-section">
            <p class="welcome-text">
              Vi gifter oss och bjuder in till bröllopsfest i vår trädgård! <br />
              Nedan finner ni all nödvändig information. <br />
              Hoppas ni vill fira vår dag med oss!
            </p>
          </section>

          <section class="info-grid">
            <div class="info-box">
              <span>Tid</span>
              <p>15:00</p>
            </div>

            <div class="info-box">
              <span>Plats</span>
              <p>Citronvägen 16 - Boden</p>
            </div>

            <div class="info-box">
              <span>Dresscode</span>
              <p>Kavaj</p>
            </div>

            <div class="info-box">
              <span>Tema</span>
              <p>Sommarblomster</p>
            </div>
          </section>

          <section class="rsvp-section">
            <p class="rsvp-text">OSA senast 1 maj 2026</p>

            <form
              class="rsvp-form"
              action="https://formsubmit.co/louise.grape@gmail.com"
              method="POST"
            >
              <input type="hidden" name="_subject" value="Ny OSA till bröllopsfesten" />
              <input type="hidden" name="_template" value="table" />
              <input type="hidden" name="_captcha" value="false" />
              <input type="hidden" name="_url" value="https://krekula-grape.netlify.app/" />
              <input type="hidden" name="_next" value="https://krekula-grape.netlify.app/tack.html" />
              <input type="hidden" name="_replyto" value="email" />
              <input
                type="text"
                name="_honey"
                class="hidden-honey"
                tabindex="-1"
                autocomplete="off"
              />

              <div class="form-grid">
                <div class="form-field">
                  <label for="guest-name">Namn</label>
                  <input id="guest-name" name="namn" type="text" required />
                </div>

                <div class="form-field">
                  <label for="email">E-post</label>
                  <input id="email" name="email" type="email" required />
                </div>

                <div class="form-field">
                  <label for="phone">Telefon</label>
                  <input id="phone" name="telefon" type="tel" />
                </div>

                <div class="form-field">
                  <label for="attending">Kommer du?</label>
                  <select id="attending" name="osa" required>
                    <option value="">Välj</option>
                    <option value="Ja, jag kommer">Ja, jag kommer</option>
                    <option value="Nej, jag kan inte komma">Nej, jag kan inte komma</option>
                  </select>
                </div>

                <div class="form-field form-field-wide">
                  <label for="tar-med-fler">Antal</label>
                  <textarea
                    id="tar-med-fler"
                    name="tar-med-fler"
                    rows="4"
                    placeholder="Skriv om du tar med dig någon här"
                  ></textarea>
                </div>

                <div class="form-field form-field-wide">
                  <label for="allergies">Allergier / specialkost</label>
                  <textarea
                    id="allergies"
                    name="allergier_specialkost"
                    rows="4"
                    placeholder="Skriv eventuella allergier eller specialkost här"
                  ></textarea>
                </div>

                <div class="form-field form-field-wide">
                  <label for="message">Meddelande</label>
                  <textarea
                    id="message"
                    name="meddelande"
                    rows="4"
                    placeholder="Valfritt meddelande"
                  ></textarea>
                </div>
              </div>

              <button type="submit" class="rsvp-button">Skicka OSA</button>
            </form>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
