<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bröllopsfest | Krekula-Grape</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>
    <div class="bg-blur blur-3"></div>

    <main class="page">
      <section class="card">
        <p class="eyebrow">Välkommen!</p>
        <h1>Bröllopsfest</h1>
        <p class="names">Krekula-Grape</p>
        <p class="subtitle">kom och fira med oss</p>

        <div class="date-pill">1/8</div>

        <section class="info-grid">
          <div class="info-box">
            <span>Tid</span>
            <p>16:00</p>
          </div>

          <div class="info-box">
            <span>Plats</span>
            <p>Citronvägen 16</p>
          </div>

          <div class="info-box">
            <span>Dresscode</span>
            <p>Kavaj</p>
          </div>

          <div class="info-box">
            <span>Tema</span>
            <p>sommarblomster</p>
          </div>

          <div class="info-box">
            <span>OSA senast</span>
            <p>1/5</p>
          </div>

          <div class="info-box">
            <span>Allergier</span>
            <p>Meddela i samband med OSA</p>
          </div>
        </section>
      </section>

      <section class="flowers-panel">
        <div class="crate crate-1"></div>
        <div class="crate crate-2"></div>
        <div class="crate crate-3"></div>

        <div class="flower flower-a">🌸</div>
        <div class="flower flower-b">🌷</div>
        <div class="flower flower-c">🌼</div>
        <div class="flower flower-d">🪻</div>
        <div class="flower flower-e">🌿</div>
        <div class="flower flower-f">🌸</div>
        <div class="flower flower-g">🌼</div>
        <div class="flower flower-h">🪻</div>
        <div class="flower flower-i">🌷</div>
        <div class="flower flower-j">🌿</div>
      </section>
    </main>
  </body>
</html>
