<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bröllopsfest | Krekula-Grape</title>
    <meta
      name="description"
      content="Välkommen till bröllopsfest för Krekula-Grape den 1/8."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="color-wash wash-1" aria-hidden="true"></div>
    <div class="color-wash wash-2" aria-hidden="true"></div>
    <div class="color-wash wash-3" aria-hidden="true"></div>

    <div class="floral floral-left" aria-hidden="true"></div>
    <div class="floral floral-top-right" aria-hidden="true"></div>
    <div class="floral floral-bottom-left" aria-hidden="true"></div>
    <div class="floral floral-bottom-right" aria-hidden="true"></div>

    <main class="page">
      <section class="invite-card">
        <p class="eyebrow">Välkommen!</p>

        <h1>Bröllopsfest</h1>

        <p class="names">Krekula-Grape</p>
        <p class="subtitle">kom och fira med oss</p>

        <div class="date-pill">1/8</div>

        <section class="info-grid">
          <div class="info-box">
            <span>För vem</span>
            <p>Krekula-Grape</p>
          </div>

          <div class="info-box">
            <span>Tid</span>
            <p>16:00</p>
          </div>

          <div class="info-box">
            <span>Plats</span>
            <p>Citronvägen 16</p>
          </div>

          <div class="info-box">
            <span>Dresscode</span>
            <p>Kavaj</p>
          </div>

          <div class="info-box">
            <span>Tema</span>
            <p>Sommarblomster</p>
          </div>

          <div class="info-box">
            <span>OSA senast</span>
            <p>1/5</p>
          </div>

          <div class="info-box info-box-wide">
            <span>Allergier</span>
            <p>Meddela allergier i samband med OSA</p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
