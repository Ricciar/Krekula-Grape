<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bröllopsfest | Krekula-Grape</title>
    <meta
      name="description"
      content="Välkommen till bröllopsfest för Fredrik och Louise den 1 augusti 2026."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="outer-flower outer-flower-1" aria-hidden="true"></div>
      <div class="outer-flower outer-flower-2" aria-hidden="true"></div>

      <main class="page">
        <section class="invite-card">
          <img
            class="corner-flower corner-flower-left"
            src="./flowers1.jpg"
            alt=""
            aria-hidden="true"
            loading="eager"
            decoding="async"
          />

          <img
            class="corner-flower corner-flower-right"
            src="./flowers2.jpg"
            alt=""
            aria-hidden="true"
            loading="eager"
            decoding="async"
          />

          <div class="content">
            <p class="hero-date">1 AUG 2026</p>

            <h1 class="hero-script">
              <span>Louise &amp;</span>
              <span>Fredrik</span>
            </h1>

            <section class="welcome-section">
              <p class="welcome-text">
                Vi gifter oss och bjuder in till bröllopsfest i vår trädgård! 
                 Nedan hittar ni all nödvändig information. <br> <br>
                </a>
              </p>

              <p class="welcome-text welcome-text-secondary">
                Hoppas ni vill fira vår dag med oss!
              </p>
            </section>

            <section class="info-grid">
              <div class="info-box">
                <span>Plats</span>
                <p>Citronvägen 16, Boden</p>
              </div>

              <div class="info-box">
                <span>Tid</span>
                <p>15:00</p>
              </div>

              <div class="info-box">
                <span>Dresscode</span>
                <p>Kavaj</p>
              </div>

              <div class="info-box">
                <span>Tema</span>
                <p>Sommarblomster</p>
              </div>
            </section>

            <div class="bottom-flowers" aria-hidden="true">
              <img
                class="bottom-flower bottom-flower-left"
                src="./flowers3.png"
                alt=""
                loading="lazy"
                decoding="async"
              />
              <img
                class="bottom-flower bottom-flower-right"
                src="./flowers4.png"
                alt=""
                loading="lazy"
                decoding="async"
              />
            </div>

            <section class="rsvp-section">
              <p class="rsvp-text">OSA senast <span class="plain-font">1</span> maj <span class="plain-font">2026</span></p>

              <form
                class="rsvp-form"
                action="https://formsubmit.co/louise.grape@gmail.com"
                method="POST"
              >
                <input type="hidden" name="_subject" value="Ny OSA till bröllopsfesten" />
                <input type="hidden" name="_template" value="table" />
                <input type="hidden" name="_captcha" value="false" />
                <input type="hidden" name="_url" value="https://krekula-grape.netlify.app/" />
                <input type="hidden" name="_next" value="https://krekula-grape.netlify.app/tack.html" />
                <input type="hidden" name="_replyto" value="email" />
                <input
                  type="text"
                  name="_honey"
                  class="hidden-honey"
                  tabindex="-1"
                  autocomplete="off"
                />

                <div class="form-grid">
                  <div class="form-field">
                    <label for="guest-name">Namn</label>
                    <input id="guest-name" name="namn" type="text" required />
                  </div>

                  <div class="form-field">
                    <label for="email">E-post</label>
                    <input id="email" name="email" type="email" required />
                  </div>

                  <div class="form-field">
                    <label for="phone">Telefon</label>
                    <input id="phone" name="telefon" type="tel" />
                  </div>

                  <div class="form-field">
                    <label for="attending">Kommer du?</label>
                    <select id="attending" name="osa" required>
                      <option value="">Välj</option>
                      <option value="Ja, jag kommer">Ja, jag kommer</option>
                      <option value="Nej, jag kan inte komma">Nej, jag kan inte komma</option>
                    </select>
                  </div>

                  <div class="form-field form-field-wide">
                    <label for="tar-med-fler">Antal</label>
                    <textarea
                      id="tar-med-fler"
                      name="tar-med-fler"
                      rows="4"
                      placeholder="Skriv om du tar med dig någon här"
                    ></textarea>
                  </div>

                  <div class="form-field form-field-wide">
                    <label for="allergies">Allergier / specialkost</label>
                    <textarea
                      id="allergies"
                      name="allergier_specialkost"
                      rows="4"
                      placeholder="Skriv eventuella allergier eller specialkost här"
                    ></textarea>
                  </div>

                  <div class="form-field form-field-wide">
                    <label for="message">Meddelande</label>
                    <textarea
                      id="message"
                      name="meddelande"
                      rows="4"
                      placeholder="Valfritt meddelande"
                    ></textarea>
                  </div>
                </div>

                <button type="submit" class="rsvp-button">Skicka OSA</button>
              </form>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
